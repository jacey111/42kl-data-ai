services:

  frontend:
    image: frontend
    pull_policy: build

    build:
      context: ./frontend

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - backend

  backend:
    image: backend
    pull_policy: build

    build:
      context: ./backend

    ports:
      - "8001:8000"

    env_file:
      - .env