<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Resume Helper Chatbot</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>

    <style>
        body {
            background: white;
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            background: #f5f5f2;
            height: 70vh;
            overflow-y: auto;
            padding: 20px;
            border-radius: 12px;
        }

        .msg {
            width: fit-content;
            max-width: 60%;
            padding: 10px 14px;
            border-radius: 14px;
            margin-bottom: 10px;
            word-wrap: break-word;
        }

        .user-msg {
            background: #544bb6;
            color: white;
            margin-left: auto;
            text-align: left;
        }

        .bot-msg {
            background: white;
            border: 1px solid #eee;
            margin-right: auto;
        }

        .input-bar {
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .upload-btn {
            border: 1px solid #ddd;
            background: white;
            padding: 6px 10px;
            border-radius: 8px;
            cursor: pointer;
        }

        .upload-btn:hover {
            border-color: #544bb6;
            color: #544bb6;
        }

        .send-btn {
            background: #544bb6;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 8px;
        }

        .send-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body class="container py-4">

    <h1>hello world!</h1>

    <!-- chat history -->
    <div id="chatBox" class="chat-container">
        <div class="msg bot-msg">
            Hi! How can I help you today?
        </div>
    </div>

    <!-- input bar -->
    <div class="mt-3 input-bar">

        <!-- upload icon -->
        <label class="upload-btn">
            <i class="bi bi-upload"></i>
            <input type="file" id="fileInput" accept=".pdf" hidden />  <!-- only allow PDF upload -->
        </label>

         <!-- file name display and cancel button -->
        <div id="fileInfo" style="display: none; align-items: center; gap: 5px;">
            <span id="fileNameDisplay" class="text-muted small"></span>
            <button id="cancelFileBtn" class="cancel-file-btn text-muted">
                <i class="bi bi-x-circle"></i>
            </button>
        </div>

        <!-- text input -->
        <input
            id="messageInput"
            type="text"
            class="form-control border-0 shadow-none"
            placeholder="Type a message..."
            style="flex: 1;"
        />

        <!-- send button -->
        <button class="send-btn" onclick="sendMessage()">
            Send
        </button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <script>
        const chatBox = document.getElementById("chatBox"); // chat history container
        let currentPdfFile = null;  // to store the currently selected PDF
        const fileInfo = document.getElementById("fileInfo");   // container for file name and cancel button
        const fileNameDisplay = document.getElementById("fileNameDisplay"); // span to display selected file name
        const cancelFileBtn = document.getElementById("cancelFileBtn"); // button to cancel selected file

        function addMessage(text, type) {
            const msg = document.createElement("div");
            msg.className = "msg " + (type === "user" ? "user-msg" : "bot-msg");    // set class name based on message type
            msg.innerText = text;  
            chatBox.appendChild(msg);   // add message to chat history
            chatBox.scrollTop = chatBox.scrollHeight; // scroll to bottom to show latest message
        }

        // Handle file selection
        document.getElementById("fileInput").addEventListener("change", function(event) { 
            const file = event.target.files[0];     // get the selected file, only the first file
            if (file && file.type === "application/pdf") {  // double-check if it's a PDF file
                currentPdfFile = file;
                fileNameDisplay.textContent = `${file.name}`;   // display selected file name to user
                fileInfo.style.display = "flex";    // show the container for file name and cancel button
            }
        });

        // Remove file when cancel button is clicked
        cancelFileBtn.addEventListener("click", function() {
            currentPdfFile = null;
            document.getElementById("fileInput").value = "";    // clear the file input so user can select file again
            fileInfo.style.display = "none";    // hide the container for file name and cancel button
            fileNameDisplay.textContent = "";
        });

        async function sendMessage() {
            const input = document.getElementById("messageInput");
            const text = input.value.trim();

            if (!text && !currentPdfFile) return;   // don't send if there's no text and no PDF

            // display user message
            let displayMessage = text;
            if (currentPdfFile && text) {
                displayMessage = `${text}\n\n[PDF: ${currentPdfFile.name}]`;
            } else if (currentPdfFile && !text) {
                displayMessage = `[PDF: ${currentPdfFile.name}]`;
            }
            
            addMessage(displayMessage, "user");     // show user message in chat history
            
            // clear input and send PDF file reference
            input.value = "";
            const pdfToSend = currentPdfFile;
            currentPdfFile = null;  // clear for next message
            document.getElementById("fileInput").value = "";    // clear file input
            fileInfo.style.display = "none";
            fileNameDisplay.textContent = "";

            // show loading indicator
            const loadingMsg = document.createElement("div");
            loadingMsg.className = "msg bot-msg";
            chatBox.appendChild(loadingMsg);
            chatBox.scrollTop = chatBox.scrollHeight;   

            try {
                // FormData is used to send multipart/form-data which can include both text and files
                const formData = new FormData();
                formData.append("message", text || "Please analyze this resume");
                
                if (pdfToSend) {
                    formData.append("pdf", pdfToSend);
                }

                // send to FastAPI backend server
                const response = await fetch("/chat", {
                    method: "POST",     // send data
                    body: formData
                });

                // remove loading message
                loadingMsg.remove();

                // check if response is successful
                if (!response.ok) {
                    throw new Error(`${response.status}: ${response.statusText}`);
                }

                const data = await response.json();     // parse response as JSON
                
                // add bot response to chat history
                if (data.error) {
                    addMessage(`Error: ${data.error}`, "bot");
                } else if (data.response) {
                    addMessage(data.response, "bot");
                } else if (data.message) {
                    addMessage(data.message, "bot");
                } else {
                    addMessage(JSON.stringify(data, null, 2), "bot");
                }

            } catch (error) {
                loadingMsg.remove();
                addMessage(`Failed to send message: ${error.message}`, "bot");
                console.error("Error:", error);
            }
        }

        // allow pressing Enter to send
        document.getElementById("messageInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        });
    </script>
    
</body>
</html>
